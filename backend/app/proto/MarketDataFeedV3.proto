syntax = "proto3";

package marketdata;

enum Type {
  initial_feed = 0;
  live_feed = 1;
  market_info = 2;
}

message LTPC {
  double ltp = 1;
  double ltt = 2;
  double ltq = 3;
  double cp = 4;
}

message Feed {
  oneof data {
    LTPC ltpc = 1;
    FF ff = 2;
  }
}

message FF {
  oneof data {
    IndexFF indexFF = 1;
    MarketFF marketFF = 2;
  }
}

message IndexFF {
  LTPC ltpc = 1;
}

message MarketFF {
  LTPC ltpc = 1;
}

message FeedsEntry {
  string key = 1;
  Feed value = 2;
}

message FeedResponse {
  Type type = 1;
  repeated FeedsEntry feeds = 2;
}
